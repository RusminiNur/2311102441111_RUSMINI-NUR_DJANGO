{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Cash Register</h1>
<form method="post" class="mb-6 bg-white p-4 rounded shadow-md">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Record Sale</button>
</form>
<!-- Add this if you display totals -->
{% if total %}
<div class="bg-white p-4 rounded shadow-md mb-4">
    <p><strong>Total:</strong> Rp {{ total }}</p>
</div>
{% endif %}
{% endblock %}
