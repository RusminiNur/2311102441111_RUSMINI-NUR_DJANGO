{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Members</h1>
<form method="post" class="mb-6 bg-white p-4 rounded shadow-md">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Add Member</button>
</form>
<table class="w-full bg-white shadow-md rounded">
    <thead>
        <tr class="bg-gray-200">
            <th class="p-2 text-left">Name</th>
            <th class="p-2 text-left">Email</th>
            <th class="p-2 text-left">Phone</th>
            <th class="p-2 text-left">Created At</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr class="border-t">
            <td class="p-2">{{ member.name }}</td>
            <td class="p-2">{{ member.email }}</td>
            <td class="p-2">{{ member.phone }}</td>
            <td class="p-2">{{ member.created_at|date:"Y-m-d" }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="p-2 text-center">No members found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
